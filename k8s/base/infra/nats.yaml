apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: edc-v
  labels:
    app: nats
    platform: edcv
    type: edcv-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      name: nats
      labels:
        app: nats
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: nats
          image: nats:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-c"
            - "/etc/nats/nats.conf"
          ports:
            - containerPort: 4222
              protocol: TCP
              name: client
            - containerPort: 8222
              protocol: TCP
              name: monitor
          volumeMounts:
            - name: nats-config
              mountPath: /etc/nats
            - name: jetstream-storage
              mountPath: /tmp/jetstream
      volumes:
        - name: nats-config
          configMap:
            name: nats-config
        - name: jetstream-storage
          emptyDir: { }
      restartPolicy: Always

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: edc-v
data:
  nats.conf: |
    # Basic server configuration
    port: 4222
    monitor_port: 8222

    # JetStream configuration
    jetstream {
        store_dir: "/tmp/jetstream"
        max_memory_store: 64MB
        max_file_store: 512MB
    }

    # Enable debug/trace
    debug: true
    trace: false

---
apiVersion: batch/v1
kind: Job
metadata:
  name: nats-bootstrap
  namespace: edc-v
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        type: edcv-job
    spec:
      containers:
        - name: nats-cli
          image: natsio/nats-box:latest
          env:
            - name: NATS_URL
              value: "nats://nats.edc-v.svc.cluster.local:4222"
          command: [ "sh", "-ec" ]
          args:
            - |
              echo "Waiting for NATS to be ready..."
              until curl -sf http://nats.edc-v.svc.cluster.local:8222/healthz > /dev/null 2>&1; do
                echo "NATS not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "NATS is ready!"

              nats stream add edc-events \
                --server "$NATS_URL" \
                --subjects "events.>" \
                --storage memory \
                --retention interest \
                --allow-direct \
                --defaults 2>/dev/null \
              && echo "Stream 'edc-events' created" \
              || echo "Stream 'edc-events' already exists, skipping"

              echo "NATS bootstrap completed successfully!"
      restartPolicy: OnFailure
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: edc-v
spec:
  type: ClusterIP
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
