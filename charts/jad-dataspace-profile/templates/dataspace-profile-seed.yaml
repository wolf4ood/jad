## Dataspace-specific seeding: creates the Dataspace Profile (credential specs) in the
## TenantManager and deploys it onto the platform-provisioned cell. Runs after
## issuer-credentials-seed (it references the credential-definition IDs created there).

{{- if .Values.seedJobs.dataspaceProfile.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: dataspace-profile-seed
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: dataspace-profile-seed
    platform: edcv
    type: edcv-job
    {{- include "cpd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": {{ .Values.seedJobs.hookDeletePolicy | quote }}
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: {{ .Values.seedJobs.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: dataspace-profile-seed
        platform: edcv
        type: edcv-job
    spec:
      serviceAccountName: {{ .Values.seedJobs.serviceAccountName }}
      restartPolicy: OnFailure
      initContainers:
        # Wait for tenant-manager to be ready (and for the platform cell to exist)
        - name: wait-for-tenant-manager
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: JWTLET_TOKEN_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              TOKEN=$(curl -sf -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource={{ .Values.issuer.participantContextId }}" \
                --data-urlencode "scope=cfm-read" \
                --data-urlencode "audience={{ .Values.global.tokenExchangeAudience }}" \
                | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              until curl -sf -H "Authorization: Bearer ${TOKEN}" http://{{ include "cpd.fqdn" (dict "svc" "tenant-manager" "ctx" $) }}:8080/api/v1alpha1/cells; do
                echo "Waiting for tenant-manager to be ready..."
                sleep 5
              done
              echo "Tenant Manager is ready!"
      containers:
        - name: seed-dataspace-profile
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: TM_BASE_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "tenant-manager" "ctx" $) }}:8080"
            - name: JWTLET_TOKEN_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -e

              # Executes a curl request and stores the response body in RESP_BODY and status code in RESP_STATUS.
              do_curl() {
                RESP=$(curl -s -w "\n%{http_code}" "$@")
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
              }

              echo "================================================"
              echo "Step 1: Obtain Provisioner Token"
              echo "================================================"

              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              if [ -z "$SA_TOKEN" ]; then
                echo "ERROR: subject token at /var/run/secrets/jwtlet/token is empty"
                exit 1
              fi

              do_curl -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource={{ .Values.issuer.participantContextId }}" \
                --data-urlencode "scope=cfm-write cfm-read" \
                --data-urlencode "audience={{ .Values.global.tokenExchangeAudience }}"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to exchange SA token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              EXCHANGED_TOKEN=$(printf '%s\n' "$RESP_BODY" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$EXCHANGED_TOKEN" ]; then
                echo "ERROR: Failed to parse exchanged token from response: $RESP_BODY"
                exit 1
              fi
              echo "✓ Provisioner token obtained"

              echo ""
              echo "================================================"
              echo "Step 2: Discover platform cell"
              echo "================================================"

              # The cell is created by the platform tenant-manager seed; discover it here.
              do_curl -H "Authorization: Bearer ${EXCHANGED_TOKEN}" "$TM_BASE_URL/api/v1alpha1/cells"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to list cells (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              CELL_ID=$(printf '%s\n' "$RESP_BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              if [ -z "$CELL_ID" ]; then
                echo "ERROR: no cell found. Is the platform tenant-manager seed applied?"
                exit 1
              fi
              echo "✓ Using cell ID: $CELL_ID"

              echo ""
              echo "================================================"
              echo "Step 3: Create and deploy Dataspace Profile"
              echo "================================================"

              # Create Dataspace Profile
              echo "Creating Dataspace Profile..."
              do_curl -X POST "$TM_BASE_URL/api/v1alpha1/dataspace-profiles" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "artifacts": [],
                  "properties": {},
                  "dataspaceSpec": {
                     "protocolStack": ["dsp-2025-1", "dcp-2025-1"],
                     "credentialSpecs": [{
                        "type": "MembershipCredential",
                        "issuer": "{{ include "cpd.issuerDid" . }}",
                        "format": "vc20-bssl/jwt",
                        "id": "membership-credential-def"
                      },
                      {
                        "type": "ManufacturerCredential",
                        "issuer": "{{ include "cpd.issuerDid" . }}",
                        "format": "vc20-bssl/jwt",
                        "id": "manufacturer-credential-def",
                        "role": "manufacturer"
                      }
                    ]
                  }
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create Dataspace Profile (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi

              DATASPACE_PROFILE_ID=$(printf '%s\n' "$RESP_BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "✓ Dataspace Profile created with ID: $DATASPACE_PROFILE_ID"

              # Deploy Dataspace Profile
              echo "Deploying Dataspace Profile..."
              do_curl -X POST "$TM_BASE_URL/api/v1alpha1/dataspace-profiles/$DATASPACE_PROFILE_ID/deployments" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "profileId": "'"$DATASPACE_PROFILE_ID"'",
                  "cellId": "'"$CELL_ID"'"
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to deploy Dataspace Profile (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi

              echo "✓ Dataspace Profile deployed successfully"
              echo "================================================"
              echo "Dataspace Profile seeding complete"
              echo "================================================"
      volumes:
        {{- include "cpd.jwtletSubjectTokenVolume" . | nindent 8 }}
{{- end }}
