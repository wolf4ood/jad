# These MUST match the core-platform-distribution release this dataspace targets:
# the namespace, cluster domain and jwtlet audiences are used to reach the running
# IssuerService / TenantManager / jwtlet services and to exchange tokens.
global:
  namespace: edc-v
  clusterDomain: svc.cluster.local
  # jwtlet participant-token audience (client_audience / bound_audiences).
  tokenExchangeAudience: edcv
  # RFC 8693 subject-token wiring (must match jwtlet's client_audience).
  jwtSubjectTokenAudience: https://kubernetes.default.svc.cluster.local
  jwtSubjectTokenExpirationSeconds: 3600

  # Default imagePullPolicy for the dataplane; overridable per-component below.
  imagePullPolicy: Always
  # HTTPRoute hostname the dataplane routes are exposed under. Must match the
  # platform's global.host and gatewayName (the same Gateway is reused).
  host: jad.localhost
  gatewayName: edcv-gateway
  # Emit JAVA_TOOL_OPTIONS with a JDWP agent (port 1044). Dev-only convenience.
  debug:
    enabled: true

# Default registry prepended to the dataplane image when its `repo` has no host.
imageRegistry: ghcr.io

# =============================================================================
# EDC dataplane. Moved out of the core-platform-distribution chart because the
# dataplane is JAD-specific. It runs in the same namespace as the platform and
# reaches the platform's postgres / vault / nats / siglet services (see the
# explicit connection hosts below, which point at the platform release).
# =============================================================================
edc:
  dataplane:
    enabled: true
    image:
      repo: eclipse-dataspace-hub/jad/dataplane
      tag: latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}

# =============================================================================
# Redline UI (dataspace management client). JAD-specific, so it ships in this
# chart rather than the platform. The platform chart provides its ServiceAccount
# ("redline") and the jwtlet mapping to the "redline" participant context; its
# "redlinedb" database is added to the platform's postgresql.databases list via
# platform-override-values.yaml.
# =============================================================================
redline:
  enabled: true
  image:
    repo: metaform/redline
    tag: latest
  replicas: 1
  # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
  imagePullPolicy: ""
  # ServiceAccount created by the platform chart (jwtlet-mapped to "redline").
  serviceAccountName: redline
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# =============================================================================
# Platform infrastructure endpoints. This chart is a SEPARATE Helm release from
# the platform, so these hosts MUST be set explicitly — they cannot be derived
# from this release's name. They point at the platform release's community
# sub-chart services (default platform release name: "core-platform"). The
# dataplane `dataplane` database is provisioned by the platform's postgres-init.
# =============================================================================
postgresql:
  connection:
    host: core-platform-postgresql.edc-v.svc.cluster.local
    port: 5432

vault:
  connection:
    host: core-platform-vault.edc-v.svc.cluster.local
    port: 8200
    scheme: http
    rootToken: root       # dev only

nats:
  connection:
    # The platform runs NATS as a release-prefixed in-chart manifest (restored from the
    # original raw manifest); the Service is named "<release>-nats" — here "core-platform".
    host: core-platform-nats.edc-v.svc.cluster.local
    port: 4222

telemetry:
  # The telemetry-config ConfigMap is provisioned by the platform chart in this
  # namespace; the dataplane envFroms it. Keep in sync with the platform setting.
  configMapEnabled: true

seedJobs:
  # ServiceAccount created by the platform chart; it has a jwtlet mapping to the
  # "issuer" participant context with the write / cfm-write scopes these jobs need.
  serviceAccountName: seed-jobs
  # hook-succeeded removes finished jobs; before-hook-creation clears a prior run on
  # upgrade; a failed job is kept for debugging (see the ttl backstop below).
  hookDeletePolicy: before-hook-creation,hook-succeeded
  ttlSecondsAfterFinished: 600
  images:
    curl: curlimages/curl:latest
    # The redline seed script needs jq to parse responses.
    curlJq: badouralix/curl-jq
  # Toggle the seeding phases independently.
  issuerCredentials:
    enabled: true
  dataspaceProfile:
    enabled: true
  # Demo Service Provider / Dataspace / Consumer+Provider tenants in Redline.
  redline:
    enabled: true
    # Participant names appended to the identityhub did:web DIDs.
    consumerName: demo-consumer
    providerName: demo-provider

# The issuer participant context these definitions are created under (matches the
# tenant created by the platform issuerservice-seed).
issuer:
  participantContextId: issuer
