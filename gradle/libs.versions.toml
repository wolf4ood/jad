[metadata]
format.version = "1.1"

[versions]
awaitility = "4.3.0"
edc = "0.19.0-SNAPSHOT"
edc-build = "1.5.2"
jackson = "2.22.0"
jackson-annotations = "2.22"
restAssured = "6.0.0"
rsApi = "4.0.0"
jersey = "4.0.2"
swagger = "2.2.52"
opentelemetry = "2.29.0"
postgres = "42.7.12"

[libraries]
# upstream EDC dependencies
edc-core-boot = { module = "org.eclipse.edc:boot", version.ref = "edc" }
edc-core-runtime = { module = "org.eclipse.edc:runtime-core", version.ref = "edc" }
edc-core-token = { module = "org.eclipse.edc:token-core", version.ref = "edc" }
edc-core-jersey = { module = "org.eclipse.edc:jersey-core", version.ref = "edc" }
edc-core-api = { module = "org.eclipse.edc:api-core", version.ref = "edc" }
edc-core-participantcontext-config = { module = "org.eclipse.edc:participant-context-config-core", version.ref = "edc" }
edc-core-participantcontext = { module = "org.eclipse.edc:participant-context-core", version.ref = "edc" }
edc-core-connector-participantcontext = { module = "org.eclipse.edc:participant-context-connector-core", version.ref = "edc" }
edc-junit = { module = "org.eclipse.edc:junit", version.ref = "edc" }
edc-vault-hashicorp = { module = "org.eclipse.edc:vault-hashicorp", version.ref = "edc" }
edc-lib-core = { module = "org.eclipse.edc:core-lib", version.ref = "edc" }
edc-core-sql-bootstrapper = { module = "org.eclipse.edc:sql-bootstrapper", version.ref = "edc" }
edc-core-http = { module = "org.eclipse.edc:http", version.ref = "edc" }
edc-core-sql = { module = "org.eclipse.edc:sql-core", version.ref = "edc" }
edc-core-connector = { module = "org.eclipse.edc:connector-core", version.ref = "edc" }
edc-transaction-local = { module = "org.eclipse.edc:transaction-local", version.ref = "edc" }
edc-transaction-pool = { module = "org.eclipse.edc:sql-pool-apache-commons", version.ref = "edc" }
edc-api-observability = { module = "org.eclipse.edc:api-observability", version.ref = "edc" }
edc-fixtures-mgmtapi = { module = "org.eclipse.edc:management-api-test-fixtures", version.ref = "edc" }
edc-monitor-otel = { module = "org.eclipse.edc:otel-monitor", version.ref = "edc" }
edc-monitor-console = { module = "org.eclipse.edc:console-monitor", version.ref = "edc" }

# EDC spi dependencies
edc-spi-core = { module = "org.eclipse.edc:core-spi", version.ref = "edc" }
edc-spi-controlplane = { module = "org.eclipse.edc:control-plane-spi", version.ref = "edc" }
edc-spi-keypair = { module = "org.eclipse.edc:keypair-spi", version.ref = "edc" }

# identityhub SPI modules
edc-ih-spi-credentials = { module = "org.eclipse.edc:verifiable-credential-spi", version.ref = "edc" }
edc-ih-spi-participantcontext = { module = "org.eclipse.edc:participant-context-spi", version.ref = "edc" }

# Third party deps
awaitility = { module = "org.awaitility:awaitility", version.ref = "awaitility" }
jackson-annotations = { module = "com.fasterxml.jackson.core:jackson-annotations", version.ref = "jackson-annotations" }
jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
tink = { module = "com.google.crypto.tink:tink", version = "1.23.0" }
restAssured = { module = "io.rest-assured:rest-assured", version.ref = "restAssured" }
jakarta-rsApi = { module = "jakarta.ws.rs:jakarta.ws.rs-api", version.ref = "rsApi" }
jersey-multipart = { module = "org.glassfish.jersey.media:jersey-media-multipart", version.ref = "jersey" }
postgres = { module = "org.postgresql:postgresql", version.ref = "postgres" }
opentelemetry-exporter-otlp = { module = "io.opentelemetry:opentelemetry-exporter-otlp", version = "1.63.0" }
opentelemetry-javaagent = { module = "io.opentelemetry.javaagent:opentelemetry-javaagent", version.ref = "opentelemetry" }

[plugins]
shadow = { id = "com.gradleup.shadow", version = "9.5.1" }
edc-build = { id = "org.eclipse.edc.edc-build", version.ref = "edc-build" }
swagger = { id = "io.swagger.core.v3.swagger-gradle-plugin", version.ref = "swagger" }
