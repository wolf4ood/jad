---
apiVersion: v1
kind: ConfigMap
metadata:
  name: controlplane-config
  namespace: edc-v
data:
  # base config
  edc.hostname: "controlplane.edc-v.svc.cluster.local"
  edc.vault.hashicorp.url: "http://vault.edc-v.svc.cluster.local:8200"
  # The default vault partition (the connector's own secrets + transit signing) uses the static root token.
  edc.vault.hashicorp.token: "root"
  # Named, per-participant vault partitions authenticate via token exchange (jwtlet) against Vault's JWT auth method.
  # The connector exchanges its projected ServiceAccount token for a participant-scoped token (sub = participantContextId)
  # and logs into Vault with the `participant` role; the resource is derived from the partition (participant context id).
  edc.vault.hashicorp.auth.tokenexchange.url: "http://jwtlet.edc-v.svc.cluster.local:8080"
  edc.vault.hashicorp.auth.tokenexchange.subjecttokenpath: "/var/run/secrets/jwtlet/token"
  edc.vault.hashicorp.auth.tokenexchange.audience: "edcv"
  edc.vault.hashicorp.auth.tokenexchange.scope: "read"
  edc.vault.hashicorp.auth.jwt.role: "participant"
  edc.participant.id: "did:web:connector"
  edc.iam.did.web.use.https: "false"
  edc.iam.credential.revocation.mimetype: "application/json"

  # web config
  web.http.port: "8080"
  web.http.path: "/api"
  web.http.protocol.port: "8082"
  web.http.protocol.path: "/api/dsp"
  web.http.protocol.virtual: "true"
  web.http.management.port: "8081"
  web.http.management.path: "/api/mgmt"
  web.http.control.port: "8083"
  web.http.control.path: "/api/control"

  # NATS config
  edc.nats.cn.subscriber.url: "nats://nats.edc-v.svc.cluster.local:4222"
  edc.nats.cn.subscriber.autocreate: "true"
  edc.nats.cn.publisher.url: "nats://nats.edc-v.svc.cluster.local:4222"
  edc.nats.tp.subscriber.url: "nats://nats.edc-v.svc.cluster.local:4222"
  edc.nats.tp.subscriber.autocreate: "true"
  edc.nats.tp.publisher.url: "nats://nats.edc-v.svc.cluster.local:4222"

  # dataplane config
  edc.datasource.default.url: "jdbc:postgresql://postgres.edc-v.svc.cluster.local:5432/controlplane"
  edc.datasource.default.user: "cp"
  edc.datasource.default.password: "cp"
  edc.sql.schema.autocreate: "true"

  edc.encryption.aes.key.alias: "aes-key-alias"

  # Oauth2 config
  # EDC verifies inbound tokens against jwtlet (the token-exchange issuer); see edc.iam.oauth2.* below.
  edc.iam.oauth2.issuer: "http://jwtlet.edc-v.svc.cluster.local:8080"
  edc.iam.oauth2.jwks.url: "http://jwtlet.edc-v.svc.cluster.local:8080/.well-known/jwks.json"

  # Default scopes config
  edc.iam.dcp.scopes.membership.id: "membership-scope"
  edc.iam.dcp.scopes.membership.type: "DEFAULT"
  edc.iam.dcp.scopes.membership.value: "org.eclipse.dspace.dcp.vc.type:MembershipCredential:read"

  edc.iam.dcp.scopes.manufacturer.id: "manufacturer-scope"
  edc.iam.dcp.scopes.manufacturer.type: "POLICY"
  edc.iam.dcp.scopes.manufacturer.value: "org.eclipse.dspace.dcp.vc.type:ManufacturerCredential:read"
  edc.iam.dcp.scopes.manufacturer.prefix-mapping: "ManufacturerCredential"
  #  edc.dataspace.enable.profiles.all: "true"
  # Trusted Issuers
  edc.iam.trusted-issuer.issuer.id: "did:web:issuerservice.edc-v.svc.cluster.local%3A10016:issuer"

  # NATS config for events
  edc.events.nats.url: "nats://nats.edc-v.svc.cluster.local:4222"
  edc.events.nats.stream: "edc-events"
  edc.events.nats.create: "false"
  edc.events.nats.create.force: "false"

  JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=1044"

  edc.iam.dcp.scopes.bpn.id: "bpn-scope"
  edc.iam.dcp.scopes.bpn.type: "DEFAULT"
  edc.iam.dcp.scopes.bpn.value: "org.eclipse.dspace.dcp.vc.type:BpnCredential:read"

  edc.iam.dcp.scopes.gov.id: "gov-scope"
  edc.iam.dcp.scopes.gov.type: "DEFAULT"
  edc.iam.dcp.scopes.gov.value: "org.eclipse.dspace.dcp.vc.type:DataExchangeGovernanceCredential:read"

  edc.jsonld.document.tx-auth.url: "https://w3id.org/tractusx/auth/v1.0.0"
  edc.jsonld.document.tx-auth.path: "/app/jsonld/tx-auth-v1.jsonld"
  edc.jsonld.document.cx-policy.url: "https://w3id.org/catenax/2025/9/policy/context.jsonld"
  edc.jsonld.document.cx-policy.path: "/app/jsonld/cx-policy-v1.jsonld"
  edc.jsonld.document.cx-odrl.url: "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
  edc.jsonld.document.cx-odrl.path: "/app/jsonld/cx-odrl.jsonld"

  edc.jsonld.binding.cx-policy.namespace: "https://w3id.org/catenax/2025/9/policy/"
  edc.jsonld.binding.cx-policy.context: "https://w3id.org/catenax/2025/9/policy/context.jsonld"

  edc.dataspace.profiles.cxneptune.name: "cx-neptune"
  edc.dataspace.profiles.cxneptune.protocol.version: "2025-1"
  edc.dataspace.profiles.cxneptune.protocol.binding: "HTTPS"
  edc.dataspace.profiles.cxneptune.protocol.namespace: "https://w3id.org/dspace/2025/1/"
  edc.dataspace.profiles.cxneptune.jsonld.context.urls: "https://w3id.org/dspace/2025/1/context.jsonld,https://w3id.org/edc/dspace/v0.0.1,https://w3id.org/catenax/2025/9/policy/context.jsonld,https://w3id.org/catenax/2025/9/policy/odrl.jsonld"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: controlplane-jsonld-contexts
  namespace: edc-v
data:
  tx-auth-v1.jsonld: |
    {
      "@context": {
        "@version": 1.1,
        "@protected": true,
        "tx-auth": "https://w3id.org/tractusx/auth/",
        "refreshToken": "tx-auth:refreshToken",
        "refreshEndpoint": "tx-auth:refreshEndpoint",
        "refreshAudience": "tx-auth:refreshAudience",
        "audience": "tx-auth:audience",
        "expiresIn": "tx-auth:expiresIn"
      }
    }
  cx-policy-v1.jsonld: |
    {
      "@context": {
        "@version": 1.1,
        "@protected": true,
        "cred": "https://www.w3.org/2018/credentials#",
        "xsd": "http://www.w3.org/2001/XMLSchema#",
        "cx-policy": "https://w3id.org/catenax/2025/9/policy/",
        "access": {
          "@id": "cx-policy:access"
        },
        "AffiliatesBpnl": {
          "@id": "cx-policy:AffiliatesBpnl"
        },
        "AffiliatesRegion": {
          "@id": "cx-policy:AffiliatesRegion"
        },
        "BusinessPartnerGroup": {
          "@id": "cx-policy:BusinessPartnerGroup"
        },
        "BusinessPartnerNumber": {
          "@id": "cx-policy:BusinessPartnerNumber"
        },
        "ConfidentialInformationMeasures": {
          "@id": "cx-policy:ConfidentialInformationMeasures"
        },
        "ConfidentialInformationSharing": {
          "@id": "cx-policy:ConfidentialInformationSharing"
        },
        "ContractReference": {
          "@id": "cx-policy:ContractReference"
        },
        "ContractTermination": {
          "@id": "cx-policy:ContractTermination"
        },
        "DataFrequency": {
          "@id": "cx-policy:DataFrequency"
        },
        "DataProvisioningEndDate": {
          "@id": "cx-policy:DataProvisioningEndDate"
        },
        "DataProvisioningEndDurationDays": {
          "@id": "cx-policy:DataProvisioningEndDurationDays"
        },
        "DataUsageEndDate": {
          "@id": "cx-policy:DataUsageEndDate"
        },
        "DataUsageEndDurationDays": {
          "@id": "cx-policy:DataUsageEndDurationDays"
        },
        "DataUsageEndDefinition": {
          "@id": "cx-policy:DataUsageEndDefinition"
        },
        "ExclusiveUsage": {
          "@id": "cx-policy:ExclusiveUsage"
        },
        "FrameworkAgreement": {
          "@id": "cx-policy:FrameworkAgreement"
        },
        "JurisdictionLocation": {
          "@id": "cx-policy:JurisdictionLocation"
        },
        "JurisdictionLocationReference": {
          "@id": "cx-policy:JurisdictionLocationReference"
        },
        "Liability": {
          "@id": "cx-policy:Liability"
        },
        "Membership": {
          "@id": "cx-policy:Membership"
        },
        "Precedence": {
          "@id": "cx-policy:Precedence"
        },
        "UsagePurpose": {
          "@id": "cx-policy:UsagePurpose"
        },
        "UsageRestriction": {
          "@id": "cx-policy:UsageRestriction"
        },
        "VersionChanges": {
          "@id": "cx-policy:VersionChanges"
        },
        "Warranty": {
          "@id": "cx-policy:Warranty"
        },
