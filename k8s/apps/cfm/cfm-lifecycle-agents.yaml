apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfm-lifecycle-agents
  namespace: edc-v
  labels:
    app: cfm-lifecycle-agents
    platform: edcv
    type: edcv-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cfm-lifecycle-agents
  template:
    metadata:
      labels:
        app: cfm-lifecycle-agents
        platform: edcv
        type: edcv-app
    spec:
      serviceAccountName: cfm-agents
      containers:
        - name: keymanagement-agent
          image: ghcr.io/eclipse-cfm/cfm/keymanagementagent:latest
          imagePullPolicy: Always
          command: [ "/keymanagementagent" ]
          args:
              - "--mode=debug"
          volumeMounts:
              - name: jwtlet-subject-token
                mountPath: /var/run/secrets/jwtlet
                readOnly: true
              - name: kmagent-config
                mountPath: /etc/appname
                readOnly: true
          envFrom:
            - configMapRef:
                name: telemetry-config
      volumes:
        # Audience-scoped, auto-rotated SA token for the cfm SA. Used as the
        # RFC 8693 subject_token when exchanging for a participant-scoped token
        # via the jwtlet token-exchange API. Audience must match jwtlet's
        # `client_audience` in jwtlet-config.yaml.
        - name: jwtlet-subject-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: https://kubernetes.default.svc.cluster.local
                  expirationSeconds: 3600
        - name: kmagent-config
          configMap:
            name: kmagent-config
      restartPolicy: Always
