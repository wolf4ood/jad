apiVersion: v2
name: jad-tractusx-connector
description: |
  JAD deployment wrapper around the upstream Eclipse Tractus-X Connector Helm chart.
  Bundles the tractusx-connector dependency so the JAD dataspace can deploy a
  Tractus-X EDC connector with JAD-specific configuration layered on top via the
  `tractusx-connector:` values block. Also bundles the bdrs-server-memory
  dependency so the dataspace deploys its own in-cluster (in-memory) BPN-DID
  Resolution Service, configured via the `bdrs-server-memory:` values block.
type: application
version: 0.1.0
appVersion: "latest"

dependencies:
  - name: tractusx-connector
    version: 0.12.0
    repository: https://eclipse-tractusx.github.io/charts/dev
  - name: bdrs-server-memory
    version: 0.6.0
    repository: https://eclipse-tractusx.github.io/charts/dev
