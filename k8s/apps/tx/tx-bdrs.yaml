apiVersion: apps/v1
kind: Deployment
metadata:
  name: tx-bdrs
  namespace: edc-v
  labels:
    app: tx-bdrs
    type: edcv-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tx-bdrs
  template:
    metadata:
      name: tx-bdrs
      labels:
        app: tx-bdrs
        platform: edcv
        type: edcv-app
    spec:
      containers:
        - name: tx-bdrs
          image: tractusx/bdrs-server-memory:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: tx-bdrs-config }
          ports:
            - containerPort: 8082
              name: management-port
            - containerPort: 8181
              name: default-port
            - containerPort: 8083
              name: directory-port
            - containerPort: 1044
              name: debug-port
          livenessProbe:
            httpGet:
              path: /check/liveness
              port: 8181
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          readinessProbe:
            httpGet:
              path: /check/readiness
              port: 8181
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          startupProbe:
            httpGet:
              path: /check/startup
              port: 8181
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: tx-bdrs
  namespace: edc-v
spec:
  type: ClusterIP
  selector:
    app: tx-bdrs
  ports:
    - name: health
      port: 8181
      targetPort: 8181
    - name: management
      port: 8082
      targetPort: 8082
    - name: directory
      port: 8083
      targetPort: 8083
    - name: debug
      port: 1044
      targetPort: 1044

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tx-bdrs
  namespace: edc-v
spec:
  parentRefs:
    - name: edcv-gateway
      kind: Gateway
      sectionName: http
  hostnames:
    - jad.localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/bdrs
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/mgmt
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: jwt-auth-management-api
      backendRefs:
        - name: tx-bdrs
          port: 8082
          weight: 1