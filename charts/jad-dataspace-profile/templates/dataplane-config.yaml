{{- if .Values.edc.dataplane.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataplane-config
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  edc.hostname: {{ include "cpd.fqdn" (dict "svc" "dataplane" "ctx" $) | quote }}

  web.http.port: "8080"
  web.http.path: "/api"
  web.http.control.port: "8083"
  web.http.control.path: "/api/control"
  web.http.public.port: "11002"
  web.http.public.path: "/api/public"
  web.http.certs.port: "8186"
  web.http.certs.path: "/api/data"

  edc.vault.hashicorp.url: {{ include "cpd.vaultUrl" . | quote }}
  edc.vault.hashicorp.token: {{ .Values.vault.connection.rootToken | quote }}
{{- if .Values.global.debug.enabled }}

  JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=1044"
{{- end }}

  edc.datasource.default.url: {{ printf "jdbc:postgresql://%s:%v/dataplane" (include "cpd.pgHost" .) .Values.postgresql.connection.port | quote }}
  edc.datasource.default.user: "dp"
  edc.datasource.default.password: "dp"
  edc.sql.schema.autocreate: "true"

  edc.iam.siglet.issuer: "siglet-issuer"
  edc.iam.siglet.jwks.url: {{ printf "http://%s:8080/keys" (include "cpd.fqdn" (dict "svc" "siglet" "ctx" $)) | quote }}

  # NATS config for events
  edc.events.nats.url: {{ include "cpd.natsUrl" . | quote }}
  edc.events.nats.stream: "edc-events"
  edc.events.nats.stream.create: "false"
  edc.events.nats.stream.create.force: "false"
{{- end }}
