        },
        "WarrantyDefinition": {
          "@id": "cx-policy:WarrantyDefinition"
        }
      }
    }
  cx-odrl.jsonld: |
    {
      "@context": {
        "odrl": "http://www.w3.org/ns/odrl/2/",
        "Policy": "odrl:Policy",
        "Rule": "odrl:Rule",
        "profile": {
          "@type": "@id",
          "@id": "odrl:profile"
