---
accessLog:
  enabled: true
  format: json
  fields:
    general:
      # full field list
      # https://doc.traefik.io/traefik/reference/install-configuration/observability/logs-and-accesslogs/#json-format-fields
      names:
        RouterName: drop
# hostPort binds Traefik to ports 80/443 of the KinD node container. Combined with the
# extraPortMappings in kind-config.yaml, the gateway is reachable on http://localhost
# without a kubectl port-forward. Requires a single-node cluster (the pod must land on
# the node whose ports are mapped).
ports:
  web:
    port: 80
    hostPort: 80
  websecure:
    port: 443
    exposedPort: 443
    hostPort: 443

# we enable gateway-api features
providers:
  kubernetesGateway:
    enabled: true
  kubernetesCRD:
    # -- Load Kubernetes IngressRoute provider
    enabled: true

# we disable gateway-api defaults because we want to provide our own
gatewayClass:
  enabled: false

# we disable gateway-api defaults because we want to provide our own
gateway:
  enabled: false