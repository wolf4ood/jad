# Traefik ForwardAuth middlewares that validate Bearer tokens via the clearglass
# service, which verifies them against jwtlet's published JWKS and checks the
# required scopes.
#
# Each middleware passes ?scope= query params to clearglass; the token must
# carry at least one of the listed scopes for the request to be allowed.

---
# requires that all requests targeting the management API be authenticated and have the appropriate scopes
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jwt-auth-management-api
  namespace: edc-v
spec:
  forwardAuth:
    address: http://clearglass.edc-v.svc.cluster.local:8080/validate?scope=management-api:read&scope=management-api:write
    authRequestHeaders:
      - Authorization
    trustForwardHeader: true

