---
name: "Run E2E Tests"

on:
  push:
  pull_request:

  workflow_run:
    workflows: [ "Draft Release" ]
    types:
      - completed

  schedule:
    - cron: '0 3 * * *'  # Run at 3am UTC every day

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  E2E-Tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: eclipse-edc/.github/.github/actions/setup-build@main

      - name: "Setup Kubectl"
        uses: azure/setup-kubectl@v5
      - name: "Set up Helm"
        uses: azure/setup-helm@v5

      - name: "Build runtime images"
        run: ./gradlew dockerize

      - name: "Create k8s Kind Cluster"
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: jad

      - name: "Load runtime images into KinD"
        run: |-
          kind load docker-image -n jad ghcr.io/eclipse-dataspace-hub/jad/dataplane:latest \
                                ghcr.io/eclipse-dataspace-hub/jad/issuerservice:latest


      - name: "Install Traefik Gateway controller"
        run: |-
          helm repo add traefik https://traefik.github.io/charts
          helm repo update
          helm upgrade --install --namespace traefik traefik traefik/traefik --create-namespace -f values.yaml
          
          # Wait for traefik to be ready
          kubectl rollout status deployment/traefik -n traefik --timeout=120s
          
          # forward port 80 -> 8080
          kubectl -n traefik port-forward svc/traefik 8080:80 &
          
          # install Gateway API CRDs
          kubectl apply --server-side --force-conflicts -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/standard-install.yaml
          
          sleep 5 # to be safe

      - name: "Deploy Core Platform Distribution"
        run: |-
          # The generic platform (connector, identity hub, issuer service, siglet, CFM,
          # jwtlet/clearglass, gateway, infra + generic seeding), consumed from an OCI registry.
          # The published chart bundles its sub-chart dependencies, so no dependency build here.
          #
          # IfNotPresent uses the KinD-loaded JAD images; everything else is pulled from GHCR.
          helm upgrade --install core-platform oci://ghcr.io/eclipse-cfm/charts/core-platform-distribution \
            --version 0.0.6 \
            --namespace edc-v --create-namespace \
            -f platform-override-values.yaml \
            --set edc.issuerservice.imagePullPolicy=Never \
            --wait --timeout 15m

      - name: "Deploy JAD dataspace profile"
        run: |-
          # Dataspace-specific seeding: issuer credential definitions + dataspace profile.
          helm upgrade --install jad-dataspace charts/jad-dataspace-profile \
            --namespace edc-v \
            --set edc.dataplane.imagePullPolicy=Never \
            --wait --timeout 10m

      - name: "Show pod status on timeout"
        if: failure()
        run: |-
          echo "Wait command timed out or failed. Showing pod status in edc-v namespace:"
          kubectl get pods -n edc-v
          echo ""
          echo "Detailed pod descriptions:"
          kubectl describe pods -n edc-v
          echo ""
          echo "Logs of unready pods:"
          for pod in $(kubectl get pods -n edc-v --no-headers | awk '$2 !~ /^([0-9]+)\/\1$/ && $3 != "Completed" {print $1}'); do
            echo "--- logs: $pod ---"
            kubectl logs -n edc-v "$pod" --all-containers --tail=200 || true
            echo "--- previous logs: $pod ---"
            kubectl logs -n edc-v "$pod" --all-containers --tail=200 --previous || true
          done

      - name: "Run E2E Test"
        run: |
          ./gradlew test -DincludeTags="EndToEndTest"

      - name: "Destroy the KinD cluster"
        run: >-
          kind delete cluster -n jad
