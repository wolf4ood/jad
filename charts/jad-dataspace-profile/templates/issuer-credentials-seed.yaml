## Dataspace-specific seeding: the Membership + Manufacturer AttestationDefinitions and
## CredentialDefinitions on the (platform-created) issuer tenant. Runs before the
## dataspace-profile-seed (which references these credential-definition IDs).

{{- if .Values.seedJobs.issuerCredentials.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: issuer-credentials-seed
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: issuer-credentials-seed
    platform: edcv
    type: edcv-job
    {{- include "cpd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": {{ .Values.seedJobs.hookDeletePolicy | quote }}
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: {{ .Values.seedJobs.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: issuer-credentials-seed
        platform: edcv
        type: edcv-job
    spec:
      serviceAccountName: {{ .Values.seedJobs.serviceAccountName }}
      restartPolicy: OnFailure
      initContainers:
        # Wait for issuerservice to be ready
        - name: wait-for-issuerservice
          image: {{ .Values.seedJobs.images.curl }}
          command:
            - sh
            - -c
            - |
              until curl -sf http://{{ include "cpd.fqdn" (dict "svc" "issuerservice" "ctx" $) }}:10010/api/check/readiness; do
                echo "Waiting for issuerservice to be ready..."
                sleep 5
              done
              echo ""
              echo "IssuerService is ready!"
      containers:
        - name: seed-issuer-credentials
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: JWTLET_TOKEN_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -e

              # Executes a curl request and stores the response body in RESP_BODY and status code in RESP_STATUS.
              do_curl() {
                RESP=$(curl -s -w "\n%{http_code}" "$@")
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
              }

              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              if [ -z "$SA_TOKEN" ]; then
                echo "ERROR: subject token at /var/run/secrets/jwtlet/token is empty"
                exit 1
              fi

              echo "================================================"
              echo "Create AttestationDefinitions"
              echo "================================================"

              # exchange SA token for a narrow-scoped participant token
              do_curl -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource={{ .Values.issuer.participantContextId }}" \
                --data-urlencode "scope=write" \
                --data-urlencode "audience={{ .Values.global.tokenExchangeAudience }}"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to exchange SA token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              EXCHANGED_TOKEN=$(printf '%s\n' "$RESP_BODY" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$EXCHANGED_TOKEN" ]; then
                echo "ERROR: Failed to parse exchanged token from response: $RESP_BODY"
                exit 1
              fi
              echo "✓ Participant-scoped token obtained"

              # Create attestation definitions
              echo "Creating Membership AttestationDefinition"
              do_curl -X POST "http://{{ include "cpd.fqdn" (dict "svc" "issuerservice" "ctx" $) }}:10013/api/admin/v1beta/participants/{{ .Values.issuer.participantContextId }}/attestations" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "attestationType": "membership",
                  "configuration": {},
                  "id": "membership-attestation-def-1"
                }'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "⚠ Membership AttestationDefinition already exists"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create Membership AttestationDefinition (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              else
                echo "✓ Membership AttestationDefinition created"
              fi

              echo "Creating Manufacturer AttestationDefinition"
              do_curl -X POST "http://{{ include "cpd.fqdn" (dict "svc" "issuerservice" "ctx" $) }}:10013/api/admin/v1beta/participants/{{ .Values.issuer.participantContextId }}/attestations" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "attestationType": "manufacturer",
                  "configuration": {},
                  "id": "manufacturer-attestation-def-1"
                }'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "⚠ Manufacturer AttestationDefinition already exists"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create Manufacturer AttestationDefinition (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              else
                echo "✓ Manufacturer AttestationDefinition created"
              fi

              echo ""
              echo "================================================"
              echo "Create CredentialDefinitions"
              echo "================================================"

              echo "Creating Membership CredentialDefinition"
              do_curl -X POST "http://{{ include "cpd.fqdn" (dict "svc" "issuerservice" "ctx" $) }}:10013/api/admin/v1beta/participants/{{ .Values.issuer.participantContextId }}/credentialdefinitions" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "attestations": ["membership-attestation-def-1"],
                  "credentialType": "MembershipCredential",
                  "id": "membership-credential-def",
                  "jsonSchema": "{}",
                  "jsonSchemaUrl": "https://example.com/schema/membership-credential.json",
                  "mappings": [
                    {
                      "input": "membership",
                      "output": "credentialSubject.membership",
                      "required": true
                    },
                    {
                      "input": "membershipType",
                      "output": "credentialSubject.membershipType",
                      "required": "true"
                    },
                    {
                      "input": "membershipStartDate",
                      "output": "credentialSubject.membershipStartDate",
                      "required": true
                    },
                    {
                      "input": "id",
                      "output": "credentialSubject.id",
                      "required": true
                    }
                  ],
                  "rules": [],
                  "format": "vc20-bssl/jwt",
                  "validity": "604800"
                }'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "⚠ Membership CredentialDefinition already exists"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create Membership CredentialDefinition (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              else
                echo "✓ Membership CredentialDefinition created"
              fi

              echo "Creating Manufacturer CredentialDefinition"
              do_curl -X POST "http://{{ include "cpd.fqdn" (dict "svc" "issuerservice" "ctx" $) }}:10013/api/admin/v1beta/participants/{{ .Values.issuer.participantContextId }}/credentialdefinitions" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "attestations": ["manufacturer-attestation-def-1"],
                  "credentialType": "ManufacturerCredential",
                  "id": "manufacturer-credential-def",
                  "jsonSchema": "{}",
                  "jsonSchemaUrl": "https://example.com/schema/manufacturer-credential.json",
                  "mappings": [
                    {
                      "input": "contractVersion",
                      "output": "credentialSubject.contractVersion",
                      "required": true
                    },
                    {
                      "input": "component_types",
                      "output": "credentialSubject.part_types",
                      "required": "true"
                    },
                    {
                      "input": "since",
                      "output": "credentialSubject.since",
                      "required": true
                    },
                    {
                      "input": "id",
                      "output": "credentialSubject.id",
                      "required": true
                    }
                  ],
                  "rules": [],
                  "format": "vc20-bssl/jwt",
                  "validity": "604800"
                }'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "⚠ Manufacturer CredentialDefinition already exists"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create Manufacturer CredentialDefinition (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              else
                echo "✓ Manufacturer CredentialDefinition created"
              fi

              echo ""
              echo "================================================"
              echo "Issuer credential seeding completed successfully!"
              echo "================================================"
      volumes:
        {{- include "cpd.jwtletSubjectTokenVolume" . | nindent 8 }}
{{- end }}
