apiVersion: batch/v1
kind: Job
metadata:
  name: provision-manager-seed
  namespace: edc-v
  labels:
    app: provision-manager-seed
    platform: edcv
    type: edcv-job
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: provision-manager-seed
        platform: edcv
        type: edcv-job
    spec:
      serviceAccountName: seed-jobs
      restartPolicy: OnFailure
      initContainers:
        # Wait for provision-manager to be ready
        - name: wait-for-provision-manager
          image: curlimages/curl:latest
          env:
            - name: JWTLET_TOKEN_URL
              value: "http://jwtlet.edc-v.svc.cluster.local:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              TOKEN=$(curl -sf -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource=issuer" \
                --data-urlencode "scope=cfm-read" \
                --data-urlencode "audience=edcv" \
                | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              until curl -sf -H "Authorization: Bearer ${TOKEN}" http://provision-manager.edc-v.svc.cluster.local:8080/api/v1alpha1/activity-definitions; do
                echo "Waiting for provision-manager to be ready..."
                sleep 5
              done
              echo "Provision Manager is ready!"
      containers:
        - name: seed-provision-manager
          image: curlimages/curl:latest
          env:
            - name: PM_BASE_URL
              value: "http://provision-manager.edc-v.svc.cluster.local:8080"
            - name: JWTLET_TOKEN_URL
              value: "http://jwtlet.edc-v.svc.cluster.local:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -e

              # Executes a curl request and stores the response body in RESP_BODY and status code in RESP_STATUS.
              do_curl() {
                RESP=$(curl -s -w "\n%{http_code}" "$@")
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
              }

              echo "================================================"
              echo "Step 0: Obtain Provisioner Token"
              echo "================================================"

              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              if [ -z "$SA_TOKEN" ]; then
                echo "ERROR: subject token at /var/run/secrets/jwtlet/token is empty"
                exit 1
              fi

              do_curl -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource=issuer" \
                --data-urlencode "scope=cfm-write" \
                --data-urlencode "audience=edcv"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to exchange SA token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              EXCHANGED_TOKEN=$(printf '%s\n' "$RESP_BODY" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$EXCHANGED_TOKEN" ]; then
                echo "ERROR: Failed to parse exchanged token from response: $RESP_BODY"
                exit 1
              fi
              echo "✓ Provisioner token obtained"

              echo ""
              echo "================================================"
              echo "ProvisionManager Seeding"
              echo "================================================"

              echo ""
              echo "Step 2: Create edcv-activity ActivityDefinition"
              echo "------------------------------------------------"

              do_curl -X POST "${PM_BASE_URL}/api/v1alpha1/activity-definitions" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "description": "Provisions EDC-V Control plane entries",
                  "inputSchema": {},
                  "outputSchema": {},
                  "type": "edcv-activity"
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create edcv-activity (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ edcv-activity created"

              echo ""
              echo "Step 3: Create identityhub-activity ActivityDefinition"
              echo "------------------------------------------------"

              do_curl -X POST "${PM_BASE_URL}/api/v1alpha1/activity-definitions" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "description": "Provisions IdentityHub entries",
                  "inputSchema": {},
                  "outputSchema": {},
                  "type": "identityhub-activity"
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create identityhub-activity (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ identityhub-activity created"

              echo ""
              echo "Step 4: Create registration-activity ActivityDefinition"
              echo "--------------------------------------------------------"

              do_curl -X POST "${PM_BASE_URL}/api/v1alpha1/activity-definitions" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "description": "Creates Holder entries on the IssuerService",
                  "inputSchema": {},
                  "outputSchema": {},
                  "type": "registration-activity"
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create registration-activity (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ registration-activity created"

              echo ""
              echo "Step 6: Create onboarding-activity ActivityDefinition"
              echo "------------------------------------------------------"

              do_curl -X POST "${PM_BASE_URL}/api/v1alpha1/activity-definitions" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "description": "Onboards participants (= requests credentials)",
                  "inputSchema": {},
                  "outputSchema": {},
                  "type": "onboarding-activity"
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create onboarding-activity (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ onboarding-activity created"

              echo ""
              echo "Step 7: Create test-activity ActivityDefinition"
              echo "------------------------------------------------"

              do_curl -X POST "${PM_BASE_URL}/api/v1alpha1/activity-definitions" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "description": "Runs JWTlet agent checks",
                  "inputSchema": {},
                  "outputSchema": {},
                  "type": "jwtlet-activity"
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create test-activity (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ jwtlet-activity created"

              echo ""
              echo "Step 8: Create Orchestration Definition (deploy + dispose)"
              echo "------------------------------------------------"

              DEPLOY_ORCH_ID=$(cat /proc/sys/kernel/random/uuid)

              do_curl -X POST "${PM_BASE_URL}/api/v1alpha1/orchestration-definitions" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "activities": {
                    "cfm.orchestration.vpa.dispose": [{
                      "id": "offboarding-agent",
                      "type": "onboarding-activity",
                      "dependsOn": []
                    },
                    {
                      "id": "registration-rollback",
                      "type": "registration-activity",
                      "dependsOn": []
                    },
                    {
                      "id": "connector-rollback",
                      "type": "edcv-activity",
                      "dependsOn": []
                    }],
                    "cfm.orchestration.vpa.deploy": [
                    {
                      "id": "jwtlet-tokenexchange-agent",
                      "type": "jwtlet-activity"
                    },
                    {
                      "id": "registration-agent",
                      "type": "registration-activity",
                      "dependsOn": [
                        "jwtlet-tokenexchange-agent"
                      ]
                    },
                    {
                      "id": "connector-provisioner",
                      "type": "edcv-activity",
                      "dependsOn": [
                        "jwtlet-tokenexchange-agent",
                        "identityhub-provisioner"
                      ]
                    },
                    {
                      "id": "identityhub-provisioner",
                      "type": "identityhub-activity",
                      "dependsOn": [
                        "jwtlet-tokenexchange-agent"
                      ]
                    },
                    {
                      "id": "onboarding-agent",
                      "type": "onboarding-activity",
                      "dependsOn": [
                        "jwtlet-tokenexchange-agent",
                        "connector-provisioner",
                        "identityhub-provisioner",
                        "registration-agent"
                      ]
                    }]
                  },
                  "description": "Orchestrates the deployment of a new dataspace member",
                  "schema": {},
                  "id": "'"${DEPLOY_ORCH_ID}"'"
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create Orchestration Definition (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ Orchestration definition created (ID: ${DEPLOY_ORCH_ID})"

              echo ""
              echo "================================================"
              echo "ProvisionManager seeding completed!"
              echo "================================================"
      volumes:
        # RFC 8693 subject_token exchanged at jwtlet's /token endpoint for a
        # cfm-scoped token. Audience must match jwtlet's `client_audience`.
        - name: jwtlet-subject-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: https://kubernetes.default.svc.cluster.local
                  expirationSeconds: 3600
