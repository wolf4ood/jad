apiVersion: apps/v1
kind: Deployment
metadata:
  name: tx-dataplane
  namespace: edc-v
  labels:
    app: tx-dataplane
    type: edcv-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tx-dataplane
  template:
    metadata:
      name: tx-dataplane
      labels:
        app: tx-dataplane
        platform: edcv
        type: edcv-app
    spec:
      containers:
        - name: tx-dataplane
          image: tractusx/edc-dataplane-hashicorp-vault:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: tx-dataplane-config }
          ports:
            - containerPort: 8081
              name: management-port
            - containerPort: 8080
              name: default-port
            - containerPort: 8084
              name: control-port
            - containerPort: 1044
              name: debug-port
          livenessProbe:
            httpGet:
              path: /api/check/liveness
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          readinessProbe:
            httpGet:
              path: /api/check/readiness
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          startupProbe:
            httpGet:
              path: /api/check/startup
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: tx-dataplane
  namespace: edc-v
spec:
  type: ClusterIP
  selector:
    app: tx-dataplane
  ports:
    - name: health
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
    - name: protocol
      port: 8082
      targetPort: 8082
    - name: control
      port: 8084
      targetPort: 8084
    - name: debug
      port: 1044
      targetPort: 1044
