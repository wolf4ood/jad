{{- if .Values.ui.enabled }}
{{- $c := .Values.ui }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jad-web-ui
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: jad-web-ui
    type: edcv-app
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  replicas: {{ $c.replicas }}
  selector:
    matchLabels:
      app: jad-web-ui
  template:
    metadata:
      labels:
        app: jad-web-ui
        platform: edcv
        type: edcv-app
    spec:
      containers:
        - name: jad-web-ui
          image: {{ include "cpd.image" (dict "img" $c.image "ctx" $) }}
          imagePullPolicy: {{ include "cpd.pullPolicy" (dict "policy" $c.imagePullPolicy "ctx" $) }}
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: HOST_API
              value: {{ $c.hostApi | quote }}
          {{- with $c.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config-volume
              mountPath: /usr/share/nginx/html/customers/assets/config
            - name: nginx-config-volume
              mountPath: /etc/nginx/conf.d/
      volumes:
        - name: config-volume
          configMap:
            name: jad-web-ui-config
            defaultMode: 420
        - name: nginx-config-volume
          configMap:
            name: jad-web-nginx-config
            defaultMode: 420
---
apiVersion: v1
kind: Service
metadata:
  name: jad-web-ui
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: jad-web-ui
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: jad-web-ui
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-jad-web-ui
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gatewayName }}
      kind: Gateway
      sectionName: http
  hostnames:
    - {{ .Values.global.host }}
  rules:
    # No JWT auth on this route — the browser UI is served as static assets
    - matches:
        - path:
            type: PathPrefix
            value: /ui
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: jad-web-ui
          port: 80
          weight: 1
{{- end }}
