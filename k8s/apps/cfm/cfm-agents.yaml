apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfm-agents
  namespace: edc-v
  labels:
    app: cfm-agents
    platform: edcv
    type: edcv-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cfm-agents
  template:
    metadata:
      labels:
        app: cfm-agents
        platform: edcv
        type: edcv-app
    spec:
      serviceAccountName: cfm-agents
      containers:
        # NOTE: the keycloak-agent has been retired. It only provisioned a per-participant Keycloak
        # "vault access" client for the old Vault JWT auth; Vault auth now uses token exchange (jwtlet).
        - name: jwtlet-agent
          image: ghcr.io/eclipse-cfm/cfm/jwtletagent:latest
          imagePullPolicy: Always
          command: [ "/jwtletagent" ]
          args:
              - "--mode=debug"
          volumeMounts:
              - name: jwtlet-subject-token
                mountPath: /var/run/secrets/jwtlet
                readOnly: true
              - name: jwtlet-agent-config
                mountPath: /etc/appname
                readOnly: true
          envFrom:
            - configMapRef:
                name: telemetry-config
        - name: edcv-agent
          image: ghcr.io/eclipse-cfm/cfm/edcvagent:latest
          imagePullPolicy: Always
          command: [ "/edcvagent" ]
          args: [
            "--mode=debug"
          ]
          envFrom:
            - configMapRef:
                name: telemetry-config
          volumeMounts:
            - name: edcv-agent-config
              mountPath: /etc/appname
              readOnly: true
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
        - name: ih-agent
          image: ghcr.io/eclipse-cfm/cfm/ihagent:latest
          imagePullPolicy: Always
          command: [ "/ihagent" ]
          args: [
            "--mode=debug"
          ]
          envFrom:
            - configMapRef:
                name: telemetry-config
          volumeMounts:
            - name: ih-agent-config
              mountPath: /etc/appname
              readOnly: true
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
        - name: registration-agent
          image: ghcr.io/eclipse-cfm/cfm/regagent:latest
          imagePullPolicy: Always
          command: [ "/regagent" ]
          args: [
            "--mode=debug"
          ]
          envFrom:
            - configMapRef:
                name: telemetry-config
          volumeMounts:
            - name: registration-agent-config
              mountPath: /etc/appname
              readOnly: true
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
        - name: onboarding-agent
          image: ghcr.io/eclipse-cfm/cfm/obagent:latest
          imagePullPolicy: Always
          command: [ "/obagent" ]
          args: [
            "--mode=debug"
          ]
          envFrom:
            - configMapRef:
                name: telemetry-config
          volumeMounts:
            - name: onboarding-agent-config
              mountPath: /etc/appname 
              readOnly: true
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
      volumes:
        # Audience-scoped, auto-rotated SA token for the cfm SA. Used as the
        # RFC 8693 subject_token when exchanging for a participant-scoped token
        # via the jwtlet token-exchange API. Audience must match jwtlet's
        # `client_audience` in jwtlet-config.yaml.
        - name: jwtlet-subject-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: https://kubernetes.default.svc.cluster.local
                  expirationSeconds: 3600
        - name: edcv-agent-config
          configMap:
            name: edcv-agent-config
        - name: ih-agent-config
          configMap:
            name: ih-agent-config
        - name: registration-agent-config
          configMap:
            name: reg-agent-config
        - name: onboarding-agent-config
          configMap:
            name: ob-agent-config
        - name: jwtlet-agent-config
          configMap:
            name: jwtlet-agent-config
      restartPolicy: Always
